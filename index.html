<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Космическа игра - Classroom</title>
  <h3>📱 Сканирай за играта</h3>
<img src="qr.png" width="200">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(black, darkblue);
  color: white;
}

#planets {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 20px;
}

.planet-box { text-align: center; }
.planet { width: 80px; }
.planet-name { margin-top: 5px; font-size: 14px; }

button {
  padding: 10px 20px;
  font-size: 16px;
  margin: 10px;
}
</style>
</head>
<body>

<h1>🌍 Космическа игра (клас)</h1>

<input id="name" placeholder="Име">
<button onclick="joinGame()">Влез</button>
<button onclick="startGameTeacher()">🧑‍🏫 Старт за всички</button>

<div>
  <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Solar_sys8.jpg" width="150">
</div>

<div id="planets"></div>

<button onclick="checkOrder()">Провери</button>

<h2 id="result"></h2>

<h3>🏆 Класиране (на живо)</h3>
<ul id="leaderboard"></ul>

<script>
// 🔥 Firebase (ТИ ТРЯБВА ДА СЛОЖИШ ТВОЯ CONFIG)
const firebaseConfig = {
  apiKey: "AIzaSyDyHmGKUIon2R-xgb9k7R_5-mYSV4K86B0",
  authDomain: "planeti-5f523.firebaseapp.com",
  databaseURL: "https://planeti-5f523-default-rtdb.firebaseio.com",
  projectId: "planeti-5f523",
  storageBucket: "planeti-5f523.appspot.com",
  messagingSenderId: "536339595743",
  appId: "1:536339595743:web:565ada41c2a9848830446a"
};

// инициализация (compat версия)
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let correctOrder = ["mercury","venus","earth","mars","jupiter","saturn","uranus","neptune"];
let startTime;
let playerName = "";
let gameStarted = false;

const planetsData = [
 {name:"mercury", label:"Меркурий", img:"https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg"},
 {name:"venus", label:"Венера", img:"https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg"},
 {name:"earth", label:"Земя", img:"https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg"},
 {name:"mars", label:"Марс", img:"https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg"},
 {name:"jupiter", label:"Юпитер", img:"https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg"},
 {name:"saturn", label:"Сатурн", img:"https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg"},
 {name:"uranus", label:"Уран", img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg"},
 {name:"neptune", label:"Нептун", img:"https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg"}
];

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function renderPlanets() {
  let container = document.getElementById("planets");
  container.innerHTML = "";

  shuffle(planetsData).forEach(p => {
    let div = document.createElement("div");
    div.className = "planet-box";
    div.dataset.name = p.name;

    div.innerHTML = `
      <img src="${p.img}" class="planet">
      <div class="planet-name">${p.label}</div>
    `;

    container.appendChild(div);
  });

  Sortable.create(container, { animation: 150 });
}

function joinGame() {
  playerName = document.getElementById("name").value || "Играч";
  document.getElementById("result").innerText = "Изчакай старта...";
}

function startGameTeacher() {
  db.ref("game/start").set(true);
}

// слушаме старта от учителя
 db.ref("game/start").on("value", snap => {
  if(snap.val() === true) {
    gameStarted = true;
    startTime = Date.now();
    renderPlanets();
    document.getElementById("result").innerText = "🚀 Старт!";
  }
});

function checkOrder() {
  if(!gameStarted) return alert("Изчакай старт!");

  let planets = document.querySelectorAll(".planet-box");
  let userOrder = [];
  planets.forEach(p => userOrder.push(p.dataset.name));

  if(JSON.stringify(userOrder) === JSON.stringify(correctOrder)) {
    let time = ((Date.now() - startTime)/1000).toFixed(2);
    document.getElementById("result").innerText = "✅ Успя за " + time + " сек.";
    db.ref("scores").push({name: playerName, time: time});
  } else {
    document.getElementById("result").innerText = "🔥 Изгоря!";
  }
}

// класиране на живо
 db.ref("scores").on("value", snap => {
  let data = snap.val();
  let list = document.getElementById("leaderboard");
  list.innerHTML = "";

  if(!data) return;

  let arr = Object.values(data);
  arr.sort((a,b)=>a.time-b.time);

  arr.slice(0,5).forEach(s => {
    let li = document.createElement("li");
    li.innerText = s.name + " - " + s.time + " сек.";
    list.appendChild(li);
  });
});

</script>

</body>
</html>
